name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --cpu=${{ matrix.arch }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm exec vite build -- --configLoader native

      - name: Build macOS package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local-live-share-macos-${{ matrix.arch }}
          path: |
            release/*${{ matrix.arch }}*.dmg
            release/*${{ matrix.arch }}*.zip
          if-no-files-found: error
